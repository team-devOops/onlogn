services:
  mysql:
    image: mysql:8.0
    container_name: onlogn-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: onlogn
      MYSQL_USER: onlogn
      MYSQL_PASSWORD: onlogn
      TZ: Asia/Seoul
    ports:
      - "3310:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
