spring:
  application:
    name: onlogn
  datasource:
    url: jdbc:h2:mem:onlogn;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: 3000

app:
  jwt:
    secret: onlogn-super-secret-key-for-jwt-signing-minimum-32-bytes-long
    access-token-expiration-seconds: 900
    refresh-token-expiration-seconds: 1209600
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
  bedrock:
    enabled: ${BEDROCK_ENABLED:true}
    region: ${AWS_REGION:us-east-1}
    model-id: ${BEDROCK_MODEL_ID:anthropic.claude-3-5-sonnet-20241022-v2:0}
