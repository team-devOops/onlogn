spring:
  datasource:
    url: jdbc:mysql://localhost:3310/onlogn?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: onlogn
    password: onlogn
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always
      schema-locations: []
      data-locations: classpath:data-dev.sql
  h2:
    console:
      enabled: false
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
