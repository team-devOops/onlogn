<script th:inline="javascript">
    const API_BASE = '';
    const PROFILE_SLUG = /*[[${slug}]]*/ '';
</script>
<script>
    (function () {
        const HEAT_LEVELS = [
            'bg-primary/5 border-primary/5',
            'bg-primary/10 border-primary/5',
            'bg-primary/20 border-primary/5',
            'bg-primary/40 border-primary/5',
            'bg-primary/60 border-primary/5',
            'bg-primary border-primary/5'
        ];

        let actYear, actMonth;
        let selectedDateStr = null;
        let aiRequestId = 0;
        const MAX_INSIGHT_TASKS = 100;
        const KEYWORD_STOPWORDS = new Set([
            '이번', '최근', '다음', '동안', '기반', '위해', '통해', '정도', '관련', '대한', '그리고', '하지만', '또한', '에서', '으로',
            'the', 'and', 'for', 'with', 'from', 'that', 'this', 'have', 'your', 'you', 'are', 'was', 'were', 'will', 'has'
        ]);

        function init() {
            const now = new Date();
            actYear = now.getFullYear();
            actMonth = now.getMonth();

            document.getElementById('activity-prev').addEventListener('click', () => changeActivityMonth(-1));
            document.getElementById('activity-next').addEventListener('click', () => changeActivityMonth(1));
            document.getElementById('btn-back-insights').addEventListener('click', showInsights);
            initAiPeriodToggle();

            fetchProfile();
            renderActivityMonth();
        }

        let currentAiPeriod = 'monthly';

        const EMOJI_OPTIONS = ['👍', '🔥', '👏', '❤️', '🎉', '🙏', '✨', '🧠', '💪', '🎯', '💡', '🚀'];

        const TAG_COLORS = {
            '디자인': '#fb923c',
            '일상': '#34d399',
            '계획': '#fbbf24',
            '개발': '#60a5fa',
            '미팅': '#a78bfa',
            '기본': '#9ca3af'
        };
        const GROUP_PALETTE = ['#fb923c', '#60a5fa', '#a78bfa', '#fbbf24', '#34d399', '#f472b6', '#82ccbd', '#f97316'];
        const DEFAULT_TAG_COLOR = '#82ccbd';
        const groupColorCache = {};

        function getTagColor(tag) {
            if (TAG_COLORS[tag]) return TAG_COLORS[tag];
            if (groupColorCache[tag]) return groupColorCache[tag];
            return DEFAULT_TAG_COLOR;
        }

        function assignGroupColor(groupId) {
            if (!groupId) return '#9ca3af';
            if (groupColorCache[groupId]) return groupColorCache[groupId];
            let hash = 0;
            for (let i = 0; i < groupId.length; i++) hash = ((hash << 5) - hash) + groupId.charCodeAt(i);
            groupColorCache[groupId] = GROUP_PALETTE[Math.abs(hash) % GROUP_PALETTE.length];
            return groupColorCache[groupId];
        }

        function initAiPeriodToggle() {
            document.querySelectorAll('.ai-period-btn').forEach(btn => {
                btn.addEventListener('click', () => switchAiPeriod(btn.dataset.period));
            });
        }

        function switchAiPeriod(period) {
            currentAiPeriod = period;
            document.querySelectorAll('.ai-period-btn').forEach(btn => {
                const isActive = btn.dataset.period === period;
                btn.classList.toggle('bg-white', isActive);
                btn.classList.toggle('dark:bg-primary/20', isActive);
                btn.classList.toggle('shadow-sm', isActive);
            });

            const aiSection = document.getElementById('ai-summary-section');
            const aiText = document.getElementById('ai-summary-text');
            aiSection.classList.remove('hidden');
            aiText.textContent = 'AI 인사이트를 불러오는 중입니다...';
            const requestId = ++aiRequestId;

            fetchTasksByPeriod(period, MAX_INSIGHT_TASKS)
                .then(tasks => {
                    if (requestId !== aiRequestId) return;
                    const summary = buildAiSummaryFromTasks(tasks, period);
                    aiText.textContent = summary;
                })
                .catch(() => {
                    if (requestId !== aiRequestId) return;
                    aiText.textContent = 'AI 인사이트를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.';
                });
        }

        function getPeriodWindow(period) {
            const now = new Date();
            const to = formatDate(now);
            const days = period === 'weekly' ? 7 : 30;
            const fromDate = new Date(now);
            fromDate.setDate(fromDate.getDate() - days);
            const from = formatDate(fromDate);
            return { from, to, days };
        }

        function fetchTasksByPeriod(period, limit) {
            const { from, to } = getPeriodWindow(period);
            return fetch(`${API_BASE}/api/v1/profiles/${PROFILE_SLUG}/tasks?due_date_from=${from}&due_date_to=${to}&limit=${limit}`)
                .then(r => r.ok ? r.json() : null)
                .then(resp => (resp && resp.data) ? resp.data : []);
        }

        function buildAiSummaryFromTasks(tasks, period) {
            if (!tasks || tasks.length === 0) {
                return '선택한 기간의 AI 인사이트가 아직 없습니다.';
            }

            const total = tasks.length;
            const done = tasks.filter(t => t.status === 'done').length;
            const inProgress = tasks.filter(t => t.status === 'in_progress').length;
            const todo = tasks.filter(t => t.status === 'todo').length;
            const rate = total > 0 ? Math.round((done / total) * 100) : 0;

            const periodLabel = period === 'weekly' ? '최근 7일' : '최근 30일';
            return `${periodLabel} 동안 공개 할 일 ${total}개 중 ${done}개를 완료해 달성률은 ${rate}%입니다. 진행 중 ${inProgress}개, 예정 ${todo}개를 바탕으로 실행 리듬을 이어가고 있어요.`;
        }

        function applyProfile(p) {
            document.getElementById('profile-name').textContent = p.display_name || '';
            document.getElementById('profile-username').textContent = '@' + (p.profile_slug || PROFILE_SLUG);
            document.getElementById('profile-bio').textContent = p.bio || '';
            if (p.avatar_url) document.getElementById('profile-avatar').src = p.avatar_url;

            const isPrivate = p.visibility === 'private';

            if (isPrivate) {
                document.getElementById('stats-public').classList.add('hidden');
                document.getElementById('stats-private').classList.remove('hidden');
                document.getElementById('stats-private').style.display = 'grid';
                document.getElementById('public-content').classList.add('hidden');
                document.getElementById('private-lock-section').classList.remove('hidden');
                document.getElementById('ai-summary-section').classList.add('hidden');
                return;
            }

            document.getElementById('stats-public').classList.remove('hidden');
            document.getElementById('stats-private').classList.add('hidden');
            document.getElementById('public-content').classList.remove('hidden');
            document.getElementById('private-lock-section').classList.add('hidden');
            document.getElementById('ai-summary-section').classList.remove('hidden');

            if (p.total_tasks !== undefined) document.getElementById('stat-total').textContent = p.total_tasks.toLocaleString();
            if (p.completion_rate !== undefined) document.getElementById('stat-rate').textContent = Math.round(p.completion_rate) + '%';
            if (p.streak_days !== undefined) document.getElementById('stat-streak').textContent = p.streak_days;

            if (p.stats_summary) {
                const s = p.stats_summary;
                document.getElementById('stat-total').textContent = (s.total_tasks || 0).toLocaleString();
                const rate = s.total_tasks > 0 ? Math.round((s.done_tasks / s.total_tasks) * 100) : 0;
                document.getElementById('stat-rate').textContent = rate + '%';
            }

            if (p.ai_summary) {
                document.getElementById('ai-summary-text').textContent = p.ai_summary;
            }
            switchAiPeriod(currentAiPeriod);

            fetchGroupDistribution();
            fetchKeywordsFromWeekly();
        }

        function fetchProfile() {
            fetch(`${API_BASE}/api/v1/profiles/${PROFILE_SLUG}`)
                .then(r => r.ok ? r.json() : null)
                .then(resp => {
                    if (resp && resp.data) {
                        applyProfile(resp.data);
                    }
                })
                .catch(() => {});
        }

        function renderGroupDist(groups) {
            const list = document.getElementById('group-dist-list');
            if (groups.length === 0) {
                list.innerHTML = '<p class="text-sm opacity-40">데이터가 없습니다</p>';
                return;
            }
            list.innerHTML = groups.map(g => `
                <div>
                    <div class="flex justify-between text-xs mb-1 font-medium">
                        <span>${escapeHtml(g.name)}</span>
                        <span>${g.percentage}%</span>
                    </div>
                    <div class="h-1 w-full bg-primary/10 rounded-full overflow-hidden">
                        <div class="h-full bg-primary" style="width: ${g.percentage}%"></div>
                    </div>
                </div>`).join('');
        }

        function fetchGroupDistribution() {
            fetch(`${API_BASE}/api/v1/profiles/${PROFILE_SLUG}/tasks?limit=${MAX_INSIGHT_TASKS}`)
                .then(r => r.ok ? r.json() : null)
                .then(resp => {
                    const tasks = resp && resp.data ? resp.data : [];
                    if (tasks.length === 0) {
                        renderGroupDist([]);
                        return;
                    }

                    const grouped = {};
                    tasks.forEach(t => {
                        const name = t.group_name || ((t.tags && t.tags.length > 0) ? t.tags[0] : '기본');
                        grouped[name] = (grouped[name] || 0) + 1;
                    });

                    const total = tasks.length;
                    const dist = Object.entries(grouped)
                        .map(([name, count]) => ({
                            name,
                            percentage: Math.max(1, Math.round((count * 100) / total))
                        }))
                        .sort((a, b) => b.percentage - a.percentage)
                        .slice(0, 6);

                    renderGroupDist(dist);
                })
                .catch(() => renderGroupDist([]));
        }

        function renderKeywords(keywords) {
            const list = document.getElementById('keywords-list');
            if (keywords.length === 0) {
                list.innerHTML = '<p class="text-sm opacity-40">데이터가 없습니다</p>';
                return;
            }
            list.innerHTML = keywords.map(k =>
                `<span class="px-3 py-1 bg-primary/10 rounded-full text-[11px] font-bold text-primary">${escapeHtml(k)}</span>`
            ).join('');
        }

        function fetchKeywordsFromWeekly() {
            const headers = { 'Content-Type': 'application/json' };
            const token = getAuthToken();
            if (token) headers['Authorization'] = 'Bearer ' + token;

            fetch(`${API_BASE}/api/v1/reviews/weekly`, {
                method: 'POST',
                headers: headers
            })
                .then(r => r.ok ? r.json() : null)
                .then(resp => {
                    const reviewText = resp && resp.data ? (resp.data.review || '') : '';
                    const keywords = extractKeywordsFromText(reviewText);
                    renderKeywords(keywords);
                })
                .catch(() => renderKeywords([]));
        }

        function extractKeywordsFromText(text) {
            if (!text) return [];

            const counts = {};
            const tokens = text
                .replace(/[#*`>\-]/g, ' ')
                .match(/[A-Za-z가-힣][A-Za-z가-힣0-9_-]{1,19}/g);

            if (!tokens) return [];

            tokens.forEach(token => {
                const word = token.toLowerCase();
                if (word.length < 2) return;
                if (KEYWORD_STOPWORDS.has(word)) return;
                counts[word] = (counts[word] || 0) + 1;
            });

            return Object.entries(counts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8)
                .map(([word]) => word);
        }

        function changeActivityMonth(delta) {
            actMonth += delta;
            if (actMonth > 11) { actMonth = 0; actYear++; }
            if (actMonth < 0)  { actMonth = 11; actYear--; }
            renderActivityMonth();
        }

        function renderActivityMonth() {
            document.getElementById('activity-month-title').textContent = `${actYear}년 ${actMonth + 1}월`;
            renderActivityGrid({});

            const from = formatDate(new Date(actYear, actMonth, 1));
            const to = formatDate(new Date(actYear, actMonth + 1, 0));
            fetch(`${API_BASE}/api/v1/profiles/${PROFILE_SLUG}/tasks?due_date_from=${from}&due_date_to=${to}&limit=100`)
                .then(r => r.ok ? r.json() : null)
                .then(resp => {
                    if (resp && resp.data && resp.data.length > 0) {
                        const heatmap = {};
                        resp.data.forEach(t => {
                            const d = t.due_date;
                            if (d) heatmap[d] = (heatmap[d] || 0) + 1;
                        });
                        renderActivityGrid(heatmap);
                    } else {
                        renderActivityGrid({});
                    }
                })
                .catch(() => renderActivityGrid({}));
        }

        function renderActivityGrid(heatmap) {
            const grid = document.getElementById('activity-grid');
            grid.innerHTML = '';

            const firstDay = new Date(actYear, actMonth, 1).getDay();
            const mondayOffset = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(actYear, actMonth + 1, 0).getDate();

            for (let i = 0; i < mondayOffset; i++) {
                const empty = document.createElement('div');
                empty.className = 'aspect-square';
                grid.appendChild(empty);
            }

            const maxCount = Math.max(1, ...Object.values(heatmap));

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = formatDate(new Date(actYear, actMonth, d));
                const count = heatmap[dateStr] || 0;
                const level = count === 0 ? 0 : Math.min(5, Math.ceil((count / maxCount) * 5));

                const cell = document.createElement('button');
                cell.className = `aspect-square rounded-md ${HEAT_LEVELS[level]} hover:ring-2 hover:ring-primary/40 transition-all`;

                if (dateStr === selectedDateStr) {
                    cell.classList.add('ring-2', 'ring-primary', 'ring-offset-2');
                }

                cell.addEventListener('click', () => showTodos(dateStr, d));
                grid.appendChild(cell);
            }
        }

        function showTodos(dateStr, day) {
            selectedDateStr = dateStr;
            renderActivityGrid({});
            renderActivityMonth();

            document.getElementById('insight-panel').classList.add('hidden');
            document.getElementById('todo-panel').classList.remove('hidden');
            document.getElementById('selected-date-text').textContent = `${actMonth + 1}월 ${day}일`;

            const list = document.getElementById('todo-list');
            list.innerHTML = '<div class="py-8 text-center text-sm opacity-40">불러오는 중...</div>';

            fetch(`${API_BASE}/api/v1/profiles/${PROFILE_SLUG}/tasks?due_date_from=${dateStr}&due_date_to=${dateStr}&limit=50`)
                .then(r => r.ok ? r.json() : null)
                .then(resp => {
                    if (resp && resp.data && resp.data.length > 0) {
                        const tasks = resp.data.map(t => {
                            const groupName = t.group_name || ((t.tags && t.tags.length > 0) ? t.tags[0] : '기본');
                            const color = t.group_color || (t.group_id ? assignGroupColor(t.group_id) : getTagColor(groupName));
                            t._group_label = groupName;
                            return Object.assign(t, { tag_color: color });
                        });
                        fetchAllReactions(tasks).then(() => renderTodoList(tasks));
                    } else {
                        renderTodoList([]);
                    }
                })
                .catch(() => renderTodoList([]));
        }

        function showInsights() {
            selectedDateStr = null;
            document.getElementById('todo-panel').classList.add('hidden');
            document.getElementById('insight-panel').classList.remove('hidden');
            renderActivityMonth();
        }

        let currentTasks = [];

        function fetchReactionsForTask(task) {
            if (!task.id) return Promise.resolve();
            return fetch(`${API_BASE}/api/v1/tasks/${task.id}/reactions`)
                .then(r => r.ok ? r.json() : null)
                .then(resp => {
                    if (resp && resp.data) {
                        task.reactions = resp.data.map(r => ({
                            emoji: r.emoji,
                            count: r.count,
                            reacted: r.requester_reacted || false
                        }));
                    }
                })
                .catch(() => {});
        }

        function fetchAllReactions(tasks) {
            return Promise.all(tasks.filter(t => t.id).map(t => fetchReactionsForTask(t)));
        }

        function getAuthToken() {
            try {
                const cookies = document.cookie.split(';');
                for (const c of cookies) {
                    const [k, v] = c.trim().split('=');
                    if (k === 'access_token') return v;
                }
            } catch (_) {}
            return localStorage.getItem('access_token') || null;
        }

        function toggleReaction(taskIdx, emoji) {
            const task = currentTasks[taskIdx];
            if (!task) return;
            if (!task.id) return;

            if (!task.reactions) task.reactions = [];
            const existing = task.reactions.find(r => r.emoji === emoji);
            if (existing) {
                existing.count++;
            } else {
                task.reactions.push({ emoji, count: 1, reacted: true });
            }
            renderTodoList(currentTasks);

            const headers = { 'Content-Type': 'application/json' };
            const token = getAuthToken();
            if (token) headers['Authorization'] = 'Bearer ' + token;

            fetch(`${API_BASE}/api/v1/tasks/${task.id}/reactions`, {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ emoji: emoji })
            })
            .then(r => r.ok ? r.json() : null)
            .then(resp => {
                if (resp && resp.data) {
                    const r = resp.data;
                    const idx = task.reactions.findIndex(x => x.emoji === r.emoji);
                    if (idx >= 0) {
                        task.reactions[idx].count = r.count;
                        task.reactions[idx].reacted = r.requester_reacted;
                        if (r.count === 0) task.reactions.splice(idx, 1);
                    } else if (r.count > 0) {
                        task.reactions.push({ emoji: r.emoji, count: r.count, reacted: r.requester_reacted });
                    }
                    renderTodoList(currentTasks);
                }
            })
            .catch(() => {
                // 실패 시 서버에서 최신 상태 다시 가져오기
                fetchReactionsForTask(task).then(() => renderTodoList(currentTasks));
            });
        }

        function renderTodoList(tasks) {
            currentTasks = tasks;
            const list = document.getElementById('todo-list');
            if (tasks.length === 0) {
                list.innerHTML = '<div class="py-8 text-center text-sm opacity-40">이 날의 할 일이 없습니다</div>';
                return;
            }

            const grouped = {};
            tasks.forEach((t, idx) => {
                t._idx = idx;
                const tag = t._group_label || ((t.tags && t.tags.length > 0) ? t.tags[0] : '기본');
                if (!grouped[tag]) grouped[tag] = [];
                grouped[tag].push(t);
            });

            list.innerHTML = '';
            Object.entries(grouped).forEach(([tag, items]) => {
                const color = items[0].tag_color || getTagColor(tag);
                const section = document.createElement('div');
                section.className = 'relative pl-6 border-l-2';
                section.style.borderLeftColor = color + '40';

                const dot = document.createElement('div');
                dot.className = 'absolute -left-[9px] top-0 size-4 rounded-full border-4 border-white dark:border-background-dark';
                dot.style.backgroundColor = color;
                section.appendChild(dot);

                const label = document.createElement('h4');
                label.className = 'text-xs font-bold uppercase tracking-widest mb-3 opacity-70';
                label.style.color = color;
                label.textContent = tag;
                section.appendChild(label);

                items.forEach(t => {
                    const card = document.createElement('div');
                    card.className = 'flex flex-col gap-3 p-4 rounded-xl bg-primary/5 border border-primary/10 hover:border-primary/30 transition-all mb-3';

                    const isDone = t.status === 'done';
                    const checkIcon = isDone
                        ? '<div class="size-6 shrink-0 flex items-center justify-center rounded-full bg-primary text-white"><span class="material-symbols-outlined text-xs font-bold">check</span></div>'
                        : '<div class="size-6 shrink-0 flex items-center justify-center rounded-full border-2 border-primary/30"></div>';
                    const linkUrl = t.link || (t.reference_links && t.reference_links.length > 0 ? t.reference_links[0] : null);
                    const linkHtml = linkUrl ? `<a class="inline-flex items-center gap-1 text-[11px] text-[#5f867e] hover:text-primary transition-colors max-w-[150px]" href="#"><span class="material-symbols-outlined text-[12px]">link</span><span class="truncate">${escapeHtml(linkUrl)}</span></a>` : '';

                    const topRow = document.createElement('div');
                    topRow.className = 'flex items-center gap-4';
                    topRow.innerHTML = `
                        ${checkIcon}
                        <div class="flex-1 min-w-0">
                            <div class="flex items-baseline gap-2 flex-wrap mb-1">
                                <p class="text-base font-bold">${escapeHtml(t.title)}</p>
                                ${linkHtml}
                            </div>
                            <div class="reaction-bar flex flex-wrap items-center gap-2"></div>
                        </div>`;
                    card.appendChild(topRow);

                    const reactionBar = topRow.querySelector('.reaction-bar');
                    (t.reactions || []).forEach(r => {
                        const btn = document.createElement('button');
                        btn.className = 'flex items-center gap-1 px-2 py-0.5 rounded-md text-[10px] font-bold transition-all cursor-pointer ' +
                            (r.reacted ? 'bg-primary/20 ring-1 ring-primary/30 dark:bg-primary/30' : 'bg-white/50 dark:bg-white/10 hover:bg-primary/10');
                        btn.innerHTML = `<span>${r.emoji}</span> ${r.count}`;
                        btn.addEventListener('click', () => toggleReaction(t._idx, r.emoji));
                        reactionBar.appendChild(btn);
                    });

                    const addBtn = document.createElement('button');
                    addBtn.className = 'size-5 flex items-center justify-center rounded-md bg-primary/10 hover:bg-primary/20 transition-colors text-primary';
                    addBtn.innerHTML = '<span class="material-symbols-outlined text-xs">add</span>';
                    reactionBar.appendChild(addBtn);

                    const picker = document.createElement('div');
                    picker.className = 'emoji-picker flex-wrap gap-1.5 pt-2 border-t border-primary/5';
                    EMOJI_OPTIONS.forEach(e => {
                        const eBtn = document.createElement('button');
                        eBtn.className = 'px-2 py-1 rounded-md bg-white/40 hover:bg-white/80 dark:bg-white/5 dark:hover:bg-white/20 text-sm transition-all';
                        eBtn.textContent = e;
                        eBtn.addEventListener('click', () => {
                            toggleReaction(t._idx, e);
                        });
                        picker.appendChild(eBtn);
                    });
                    card.appendChild(picker);

                    addBtn.addEventListener('click', () => picker.classList.toggle('active'));

                    section.appendChild(card);
                });

                list.appendChild(section);
            });
        }

        function formatDate(d) {
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', init);
    })();
</script>
</body>
</html>
