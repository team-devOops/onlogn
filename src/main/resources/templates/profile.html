<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title th:text="${'@' + slug + ' - O(NlogN)'}">프로필 - O(NlogN)</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#82ccbd",
                        "background-light": "#f6f7f7",
                        "background-dark": "#151d1c",
                    },
                    fontFamily: {
                        "display": ["IBM Plex Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-display bg-background-light text-[#111816] dark:bg-background-dark dark:text-[#f6f7f7] antialiased;
            }
        }
        .activity-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        #insight-panel.hidden, #todo-panel.hidden {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen">
<div class="max-w-[1000px] mx-auto px-4 py-12 md:px-8 lg:py-16">

    <section class="flex flex-col items-center text-center mb-12">
        <div class="relative mb-6">
            <div class="size-28 rounded-full overflow-hidden border-4 border-white dark:border-background-dark shadow-sm bg-primary/10">
                <img id="profile-avatar" alt="avatar" class="w-full h-full object-cover" src=""/>
            </div>
            <div class="absolute bottom-1 right-1 size-6 bg-primary border-4 border-white dark:border-background-dark rounded-full"></div>
        </div>
        <h1 id="profile-name" class="text-3xl font-bold tracking-tight mb-1"></h1>
        <p id="profile-username" class="text-sm font-semibold text-primary mb-4"></p>
        <p id="profile-bio" class="text-[#5f867e] dark:text-primary/70 max-w-lg leading-relaxed mb-8"></p>

        <div class="grid grid-cols-3 gap-4 md:gap-12 w-full max-w-2xl border-t border-primary/10 pt-8">
            <div class="flex flex-col">
                <span id="stat-total" class="text-2xl font-bold">0</span>
                <span class="text-[10px] uppercase tracking-widest font-bold opacity-50">총 할 일</span>
            </div>
            <div class="flex flex-col border-x border-primary/10 px-4">
                <span id="stat-rate" class="text-2xl font-bold">0%</span>
                <span class="text-[10px] uppercase tracking-widest font-bold opacity-50">달성률</span>
            </div>
            <div class="flex flex-col">
                <span id="stat-streak" class="text-2xl font-bold">0</span>
                <span class="text-[10px] uppercase tracking-widest font-bold opacity-50">연속 달성일</span>
            </div>
        </div>
    </section>

    <section id="ai-summary-section" class="hidden mb-12">
        <div class="bg-primary/10 dark:bg-primary/5 rounded-xl p-4 md:p-6 flex flex-col md:flex-row items-center gap-6 border border-primary/20">
            <div class="size-12 rounded-xl bg-primary flex items-center justify-center text-white shrink-0">
                <span class="material-symbols-outlined text-2xl">auto_awesome</span>
            </div>
            <div class="flex-1 text-center md:text-left">
                <h3 class="text-xs font-bold uppercase tracking-wider text-primary mb-1">AI 생산성 요약</h3>
                <p id="ai-summary-text" class="text-sm md:text-base font-medium leading-relaxed opacity-80"></p>
            </div>
        </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-16">

        <div class="lg:col-span-7">
            <div class="flex items-center justify-between mb-6">
                <h2 id="activity-month-title" class="text-lg font-bold"></h2>
                <div class="flex gap-1">
                    <button id="activity-prev" class="size-8 flex items-center justify-center rounded-lg hover:bg-primary/10 border border-primary/10">
                        <span class="material-symbols-outlined text-sm">chevron_left</span>
                    </button>
                    <button id="activity-next" class="size-8 flex items-center justify-center rounded-lg hover:bg-primary/10 border border-primary/10">
                        <span class="material-symbols-outlined text-sm">chevron_right</span>
                    </button>
                </div>
            </div>
            <div class="bg-white/40 dark:bg-primary/5 p-6 rounded-xl border border-primary/10">
                <div class="grid grid-cols-7 gap-2 mb-2 text-center text-[10px] font-bold uppercase opacity-40">
                    <span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span><span>일</span>
                </div>
                <div id="activity-grid" class="activity-grid"></div>
            </div>
        </div>

        <div class="lg:col-span-5 relative">

            <div class="space-y-6" id="insight-panel">
                <div id="group-dist-card" class="p-6 rounded-xl border border-primary/10 bg-white/40 dark:bg-primary/5">
                    <h3 class="text-xs font-bold uppercase tracking-widest opacity-50 mb-4">그룹 분포</h3>
                    <div id="group-dist-list" class="space-y-3"></div>
                </div>
                <div id="keywords-card" class="p-6 rounded-xl border border-primary/10 bg-white/40 dark:bg-primary/5">
                    <h3 class="text-xs font-bold uppercase tracking-widest opacity-50 mb-4">관심 키워드</h3>
                    <div id="keywords-list" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <div class="hidden h-full" id="todo-panel">
                <div class="flex items-center gap-3 mb-6">
                    <button id="btn-back-insights" class="size-8 flex items-center justify-center rounded-lg hover:bg-primary/10 border border-primary/10 transition-colors">
                        <span class="material-symbols-outlined text-base">arrow_back</span>
                    </button>
                    <h2 id="selected-date-text" class="text-lg font-bold"></h2>
                </div>
                <div id="todo-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <footer class="mt-24 pt-8 border-t border-primary/10 flex flex-col md:flex-row items-center justify-between gap-4 opacity-40">
        <p class="text-[10px] font-bold uppercase tracking-[0.2em]">&copy; 2024 O(NlogN). ALL RIGHTS RESERVED.</p>
        <div class="flex gap-6">
            <a class="text-[10px] font-bold uppercase tracking-widest hover:opacity-100" href="#">개인정보 처리방침</a>
            <a class="text-[10px] font-bold uppercase tracking-widest hover:opacity-100" href="#">이용약관</a>
            <a class="text-[10px] font-bold uppercase tracking-widest hover:opacity-100" href="#">문의하기</a>
        </div>
    </footer>
</div>

<script th:inline="javascript">
    const API_BASE = /*[[${apiBase}]]*/ '';
    const PROFILE_SLUG = /*[[${slug}]]*/ '';
</script>
<script>
    (function () {
        const HEAT_LEVELS = [
            'bg-primary/5 border-primary/5',
            'bg-primary/10 border-primary/5',
            'bg-primary/20 border-primary/5',
            'bg-primary/40 border-primary/5',
            'bg-primary/60 border-primary/5',
            'bg-primary border-primary/5'
        ];

        let actYear, actMonth;
        let selectedDateStr = null;

        function init() {
            const now = new Date();
            actYear = now.getFullYear();
            actMonth = now.getMonth();

            document.getElementById('activity-prev').addEventListener('click', () => changeActivityMonth(-1));
            document.getElementById('activity-next').addEventListener('click', () => changeActivityMonth(1));
            document.getElementById('btn-back-insights').addEventListener('click', showInsights);

            fetchProfile();
            renderActivityMonth();
        }

        const DUMMY_PROFILE = {
            display_name: '알렉스 리베라',
            profile_slug: PROFILE_SLUG || 'arivera_dev',
            bio: '크리에이터와 디지털 가드너를 위한 미니멀한 도구를 만듭니다.\n복잡한 세상 속 단순함을 하나씩 큐레이션합니다.',
            avatar_url: 'https://lh3.googleusercontent.com/aida-public/AB6AXuB735EWX_nztGNDdVckqgadscOxj7OAUGbGJjFh2Y47d8ltwNFD5clzpYqgoZ_G-zP9mia3V9ronS4UMK8_DUKGox12q99VUq_QJ8ur5Ay1Cm8wXg_HX_eenr1ryhNY8zvO8YMS8uBAMtav2SHrxUkPBclexGnHnrzAKyyV_ffr3vI9MUv6OajIV9E6DjPAo9BHyEXQrOAk1ExL27M7SdY12V675gVQ1xkX_5G86zQC75cRJ7WhniGnGFTDWU_zTbVAFm3p9OI5DTK8',
            total_tasks: 1284,
            completion_rate: 94.2,
            streak_days: 18,
            ai_summary: '최근 알렉스님의 제품 디자인 일관성이 매우 뛰어납니다. 몰입이 필요한 과업의 85%를 정오 이전에 완료하며 강력한 오전 추진력을 보여주고 있습니다.',
            group_distribution: [
                { name: '디자인', percentage: 45 },
                { name: '개발', percentage: 30 },
                { name: '개인', percentage: 25 }
            ],
            keywords: ['UI 디자인', 'React', '가드닝', '미니멀리즘', '타이포그래피']
        };

        function generateDummyHeatmap() {
            const heatmap = {};
            const daysInMonth = new Date(actYear, actMonth + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = formatDate(new Date(actYear, actMonth, d));
                const r = Math.random();
                if (r > 0.3) heatmap[dateStr] = Math.ceil(Math.random() * 8);
            }
            return heatmap;
        }

        function generateDummyTodos(dateStr) {
            const titles = [
                '랜딩 페이지 타이포그래피 시스템 고도화',
                '아침 명상 및 저널링 세션',
                '1분기 목표 검토 및 새 목표 설정',
                '컴포넌트 라이브러리 리팩토링',
                '팀 주간 회의 준비'
            ];
            const count = Math.floor(Math.random() * 4) + 1;
            return titles.slice(0, count).map((title, i) => ({
                title: title,
                status: Math.random() > 0.3 ? 'done' : 'todo'
            }));
        }

        function applyProfile(p) {
            document.getElementById('profile-name').textContent = p.display_name || '';
            document.getElementById('profile-username').textContent = '@' + (p.profile_slug || PROFILE_SLUG);
            document.getElementById('profile-bio').textContent = p.bio || '';
            if (p.avatar_url) document.getElementById('profile-avatar').src = p.avatar_url;

            if (p.total_tasks !== undefined) document.getElementById('stat-total').textContent = p.total_tasks.toLocaleString();
            if (p.completion_rate !== undefined) document.getElementById('stat-rate').textContent = Math.round(p.completion_rate) + '%';
            if (p.streak_days !== undefined) document.getElementById('stat-streak').textContent = p.streak_days;

            if (p.ai_summary) {
                document.getElementById('ai-summary-text').textContent = p.ai_summary;
                document.getElementById('ai-summary-section').classList.remove('hidden');
            }

            renderGroupDist(p.group_distribution || []);
            renderKeywords(p.keywords || []);
        }

        function fetchProfile() {
            fetch(`${API_BASE}/api/v1/profiles/${PROFILE_SLUG}`)
                .then(r => r.ok ? r.json() : null)
                .then(resp => {
                    if (resp && resp.data) {
                        applyProfile(resp.data);
                    } else {
                        applyProfile(DUMMY_PROFILE);
                    }
                })
                .catch(() => applyProfile(DUMMY_PROFILE));
        }

        function renderGroupDist(groups) {
            const list = document.getElementById('group-dist-list');
            if (groups.length === 0) {
                list.innerHTML = '<p class="text-sm opacity-40">데이터가 없습니다</p>';
                return;
            }
            list.innerHTML = groups.map(g => `
                <div>
                    <div class="flex justify-between text-xs mb-1 font-medium">
                        <span>${escapeHtml(g.name)}</span>
                        <span>${g.percentage}%</span>
                    </div>
                    <div class="h-1 w-full bg-primary/10 rounded-full overflow-hidden">
                        <div class="h-full bg-primary" style="width: ${g.percentage}%"></div>
                    </div>
                </div>`).join('');
        }

        function renderKeywords(keywords) {
            const list = document.getElementById('keywords-list');
            if (keywords.length === 0) {
                list.innerHTML = '<p class="text-sm opacity-40">데이터가 없습니다</p>';
                return;
            }
            list.innerHTML = keywords.map(k =>
                `<span class="px-3 py-1 bg-primary/10 rounded-full text-[11px] font-bold text-primary">${escapeHtml(k)}</span>`
            ).join('');
        }

        function changeActivityMonth(delta) {
            actMonth += delta;
            if (actMonth > 11) { actMonth = 0; actYear++; }
            if (actMonth < 0)  { actMonth = 11; actYear--; }
            renderActivityMonth();
        }

        function renderActivityMonth() {
            document.getElementById('activity-month-title').textContent = `${actYear}년 ${actMonth + 1}월`;
            renderActivityGrid({});

            const from = formatDate(new Date(actYear, actMonth, 1));
            const to = formatDate(new Date(actYear, actMonth + 1, 0));
            fetch(`${API_BASE}/api/v1/profiles/${PROFILE_SLUG}/tasks?due_date_from=${from}&due_date_to=${to}&limit=100`)
                .then(r => r.ok ? r.json() : null)
                .then(resp => {
                    if (resp && resp.data && resp.data.length > 0) {
                        const heatmap = {};
                        resp.data.forEach(t => {
                            const d = t.due_date;
                            if (d) heatmap[d] = (heatmap[d] || 0) + 1;
                        });
                        renderActivityGrid(heatmap);
                    } else {
                        renderActivityGrid(generateDummyHeatmap());
                    }
                })
                .catch(() => renderActivityGrid(generateDummyHeatmap()));
        }

        function renderActivityGrid(heatmap) {
            const grid = document.getElementById('activity-grid');
            grid.innerHTML = '';

            const firstDay = new Date(actYear, actMonth, 1).getDay();
            const mondayOffset = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(actYear, actMonth + 1, 0).getDate();

            for (let i = 0; i < mondayOffset; i++) {
                const empty = document.createElement('div');
                empty.className = 'aspect-square';
                grid.appendChild(empty);
            }

            const maxCount = Math.max(1, ...Object.values(heatmap));

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = formatDate(new Date(actYear, actMonth, d));
                const count = heatmap[dateStr] || 0;
                const level = count === 0 ? 0 : Math.min(5, Math.ceil((count / maxCount) * 5));

                const cell = document.createElement('button');
                cell.className = `aspect-square rounded-md ${HEAT_LEVELS[level]} hover:ring-2 hover:ring-primary/40 transition-all`;

                if (dateStr === selectedDateStr) {
                    cell.classList.add('ring-2', 'ring-primary', 'ring-offset-2');
                }

                cell.addEventListener('click', () => showTodos(dateStr, d));
                grid.appendChild(cell);
            }
        }

        function showTodos(dateStr, day) {
            selectedDateStr = dateStr;
            renderActivityGrid({});
            renderActivityMonth();

            document.getElementById('insight-panel').classList.add('hidden');
            document.getElementById('todo-panel').classList.remove('hidden');
            document.getElementById('selected-date-text').textContent = `${actMonth + 1}월 ${day}일`;

            const list = document.getElementById('todo-list');
            list.innerHTML = '<div class="py-8 text-center text-sm opacity-40">불러오는 중...</div>';

            fetch(`${API_BASE}/api/v1/profiles/${PROFILE_SLUG}/tasks?due_date_from=${dateStr}&due_date_to=${dateStr}&limit=50`)
                .then(r => r.ok ? r.json() : null)
                .then(resp => {
                    if (resp && resp.data && resp.data.length > 0) {
                        renderTodoList(resp.data);
                    } else {
                        renderTodoList(generateDummyTodos(dateStr));
                    }
                })
                .catch(() => renderTodoList(generateDummyTodos(dateStr)));
        }

        function showInsights() {
            selectedDateStr = null;
            document.getElementById('todo-panel').classList.add('hidden');
            document.getElementById('insight-panel').classList.remove('hidden');
            renderActivityMonth();
        }

        function renderTodoList(tasks) {
            const list = document.getElementById('todo-list');
            if (tasks.length === 0) {
                list.innerHTML = '<div class="py-8 text-center text-sm opacity-40">이 날의 할 일이 없습니다</div>';
                return;
            }

            list.innerHTML = tasks.map(t => {
                const isDone = t.status === 'done';
                const checkIcon = isDone
                    ? '<div class="size-6 flex items-center justify-center rounded-full bg-primary text-white"><span class="material-symbols-outlined text-xs font-bold">check</span></div>'
                    : '<div class="size-6 flex items-center justify-center rounded-full border-2 border-primary/30"></div>';

                return `
                    <div class="group flex items-center gap-4 p-4 rounded-xl border border-primary/5 bg-white/40 dark:bg-primary/5 hover:border-primary/20 transition-all">
                        ${checkIcon}
                        <p class="flex-1 text-sm font-medium ${isDone ? 'line-through opacity-40' : ''}">${escapeHtml(t.title)}</p>
                    </div>`;
            }).join('');
        }

        function formatDate(d) {
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', init);
    })();
</script>
</body>
</html>
