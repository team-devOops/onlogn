<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>O(NlogN) - 로그인 중...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'IBM Plex Sans', sans-serif; }
        .spinner { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen bg-[#f6f7f7] flex items-center justify-center">
<div class="text-center space-y-4">
    <div class="inline-block w-8 h-8 border-3 border-[#82ccbd] border-t-transparent rounded-full spinner"></div>
    <p class="text-sm text-gray-500">로그인 처리 중...</p>
</div>
<script th:inline="javascript">
    const accessToken = /*[[${accessToken}]]*/ '';
    const refreshToken = /*[[${refreshToken}]]*/ '';
    const expiresIn = /*[[${expiresIn}]]*/ 900;

    if (accessToken) {
        localStorage.setItem('access_token', accessToken);
        localStorage.setItem('refresh_token', refreshToken);
        localStorage.setItem('token_expires_at', String(Date.now() + expiresIn * 1000));
        window.location.replace('/dashboard');
    } else {
        window.location.replace('/?error=auth_failed');
    }
</script>
</body>
</html>
